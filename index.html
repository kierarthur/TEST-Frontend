<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>CloudTMS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <style>
       :root{
      --bg:#020617;
      --panel:#0b1221;
      --muted:#1f2937;
      --text:#f8fafc;
      --sub:#cbd5e1;
      --brand:#4f46e5;
      --ok:#16a34a;
      --warn:#f59e0b;
      --fail:#ef4444;
      --line:#334155;
      --chip:#0ea5e9;
      --hover: rgba(79,70,229,.12);
      --selection-blue:#2563eb;
      --selection-blue-bg:rgba(37,99,235,.22);
      --selection-blue-bg-strong:rgba(37,99,235,.34);
      --selection-blue-border:#60a5fa;
      --radius:12px;
      --shadow: 0 6px 20px rgba(0,0,0,.25);
    }

 
  /* ===== Dark controls for Summary + Tools filters (non-modal) ===== */
  .dark-control{
    color-scheme: dark;
    background:#0b152a !important;
    color:var(--text) !important;
    border:1px solid var(--line) !important;
    border-radius:8px !important;
    padding:4px 8px !important;
    font-size:12px !important;
    outline:none;
  }
  .dark-control:focus{
    box-shadow: 0 0 0 2px rgba(79,70,229,.35);
  }
  .dark-control option{
    background:#020617;
    color:var(--text);
  }

  /* ===== Pager active page highlight ===== */
  .pager .pager-btn.active{
    background:var(--selection-blue-bg-strong) !important;
    border-color:var(--selection-blue-border) !important;
    color:#fff !important;
    font-weight:700;
  }
    *{box-sizing:border-box}
html,body{
  height:100%;
}

body{
  margin:0;
  background:#020617;
  color:var(--text);
  font:13px/1.5 system-ui,Segoe UI,Roboto,Helvetica,Arial,"Apple Color Emoji","Segoe UI Emoji";
  /* Default: no window scroll, we use inner scrolls (.summary-body, modals) */
  overflow:hidden;
}

/* Force native form controls in modal to use dark UI */
#modal, .modal { 
  color-scheme: dark;
}

/* Evidence dropdowns use class="input" but were rendering "white menu + white text" */
#modal select.input,
#modal .tabc select.input{
  background:#000 !important;                 /* overrides inline background:transparent */
  color:var(--text) !important;
  border:1px solid var(--line) !important;
}

/* Try to force dropdown option palette dark as well (works in Chrome/Edge; varies by OS) */
#modal select.input option{
  background:#020617;
  color:var(--text);
}


    a{color:inherit}

    /* ===== App chrome ===== */
    .topbar{
      position:sticky; top:0; z-index:9;
      display:flex; align-items:center; gap:10px;
      padding:8px 16px;
      background:rgba(15,23,42,.9);
      border-bottom:1px solid rgba(148,163,184,.35);
      backdrop-filter:saturate(150%) blur(10px);
    }
    .brand{
      display:flex;align-items:center;gap:10px;
      margin-right:8px;
      font-weight:700;
      font-size:14px;
      letter-spacing:.02em;
    }
    .brand .row-dot{
      width:10px;height:10px;border-radius:50%;
      background:var(--brand);
      box-shadow:0 0 12px var(--brand);
    }

    .nav{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
    }
    .nav button{
      display:flex;
      align-items:center;
      gap:8px;
      border:1px solid rgba(148,163,184,.4);
      background:rgba(15,23,42,.95);
      color:var(--text);
      padding:6px 10px;
      border-radius:999px;
      cursor:pointer;
      transition:background .12s ease,border-color .12s ease,transform .06s ease;
      box-shadow:none;
      font-size:12px;
    }
    .nav button:hover{
      background:rgba(30,64,175,.35);
      border-color:rgba(129,140,248,.7);
      transform:translateY(-0.5px);
    }
    .nav button.active{
      outline:none;
      border-color:#6366f1;
      background:rgba(79,70,229,.22);
    }
    .nav .ico{ width:18px; height:18px; opacity:.9 }

    .userbox{
      display:flex;
      align-items:center;
      gap:10px;
      margin-left:auto;
      color:var(--sub);
      font-size:12px;
    }
    .userbox .chip{
      background:#020617;
      border:1px solid var(--line);
      padding:4px 10px;
      border-radius:20px;
    }
    .userbox button{
      background:transparent;
      color:var(--sub);
      border:1px solid var(--line);
      padding:6px 10px;
      border-radius:10px;
      cursor:pointer;
      font-size:12px;
    }
    .userbox button:hover{
      background:var(--hover);
      color:var(--text);
    }

    /* ===== Layout ===== */
.layout{
  display:grid;
  grid-template-columns:260px 1fr;
  grid-template-rows: 1fr;
  gap:16px;
  height:calc(100vh - 48px);  /* fill the viewport under the topbar */
  min-height:0;
  padding:16px;
}
@media (max-height: 800px) {
  html, body{
    height:auto;
    min-height:0;
    overflow:auto;             /* allow outer window to scroll when screen is short */
  }

  .layout{
    height:auto;               /* layout can grow taller than the viewport */
    min-height:calc(100vh - 48px);
  }
}


    .panel{
      background:radial-gradient(circle at top left,#020617 0,#020617 45%,#020617 100%);
      border:1px solid rgba(30,64,175,.35);
      border-radius:var(--radius);
      box-shadow:0 18px 40px rgba(15,23,42,.75);
      min-height:0;
    }

    .tools{
      padding:12px;
      position:sticky;
      top:72px;
      height:fit-content;
    }
    .tools h3{
      margin:4px 0 8px;
      font-size:11px;
      font-weight:600;
      color:var(--sub);
      text-transform:uppercase;
      letter-spacing:.12em;
    }
    .tools .group{
      border-top:1px dashed var(--line);
      padding-top:10px;
      margin-top:8px;
    }
    .tools button,
    .tools .btn{
      width:100%;
      text-align:left;
      display:flex;
      align-items:center;
      gap:10px;
      background:#020617;
      border:1px solid var(--line);
      color:var(--text);
      padding:8px 10px;
      border-radius:10px;
      cursor:pointer;
      margin:6px 0;
      font-size:12px;
    }
    .tools button:hover{
      background:var(--hover);
    }
    .tools .note{
      font-size:12px;
      color:#9ca3af;
    }

    /* ===== Summary / main panel ===== */
    .main{
      padding:0;
      display:flex;
      flex-direction:column;
      min-height:0;
    }

    .toolbar{
      display:flex;
      align-items:center;
      gap:8px;
      padding:10px 12px;
      border-bottom:1px solid var(--line);
    }
    .toolbar .title{
      font-weight:600;
      font-size:15px;
      letter-spacing:.01em;
    }
    .spacer{ flex:1 }
    .toolbar input[type="text"]{
      background:#0b1427;
      border:1px solid var(--line);
      color:#fff;
      border-radius:8px;
      padding:8px 10px;
      min-width:260px;
      font-size:12px;
    }
    .toolbar input[type="text"]::placeholder{
      color:#64748b;
    }
    .toolbar .mini{
      font-size:12px;
      color:var(--sub);
    }

    /* "Columns" toolbar button */
    .toolbar button{
      border:1px solid rgba(148,163,184,.45);
      background:#020617;
      color:#e5e7eb;
      padding:6px 10px;
      border-radius:999px;
      cursor:pointer;
      font-size:12px;
    }
    .toolbar button:hover{
      background:rgba(79,70,229,.25);
      border-color:#6366f1;
      color:#f9fafb;
    }

    .main select{
      background:#050b16;
      border:1px solid rgba(255,255,255,.15);
      color:#f8fafc;
      border-radius:6px;
      padding:2px 8px;
      font-size:12px;
    }

    #content{
      flex:1;
      min-height:0;
      display:flex;
      flex-direction:column;
    }

.summary-body{
  flex:1;
  min-height:0;
  overflow-y:auto;
  overflow-x:auto;
  scrollbar-width:thin;
  scrollbar-color:#1e293b #020617;
}
.summary-body:focus,
.summary-body:focus-visible{
  outline:none;
  box-shadow:none;
}
.summary-body::-webkit-scrollbar{
  width:8px;
  height:8px;
}
    .summary-body::-webkit-scrollbar-track{
      background:#020617;
    }
    .summary-body::-webkit-scrollbar-thumb{
      background:#1e293b;
      border-radius:999px;
      border:1px solid #020617;
    }
    .summary-body::-webkit-scrollbar-thumb:hover{
      background:#334155;
    }

    /* ===== Grid / table ===== */
    .grid{
      border-collapse:separate;
      border-spacing:0;
      table-layout:fixed;
      width:100%;
    }
    .grid th,
    .grid td{
      padding:10px 12px;
      border-bottom:1px solid var(--line);
      vertical-align:top;
      font-size:12px;
    }
    .grid th{
      position:sticky;
      top:0;
      z-index:1;
      background:#020617;
      border-bottom:1px solid var(--line);
      text-align:left;
    }

    .grid thead tr{
      border-top:1px solid var(--line);
      border-bottom:1px solid var(--line);
    }
    .grid thead th:first-child{
      border-left:1px solid var(--line);
    }
    .grid thead th:last-child{
      border-right:1px solid var(--line);
    }
    .grid thead th + th{
      border-left:1px solid var(--line);
    }

    .main .grid thead th:first-child,
    .main .grid tbody td:first-child{
      width:40px;
      min-width:40px;
      max-width:40px;
      text-align:center;
    }

     .grid tbody tr:nth-child(2n){
      background:rgba(15,23,42,.55);
    }
    .grid tbody tr:hover{
      background:rgba(30,64,175,.25);
    }

    /* ✅ Summary grid rows are clickable: use pointer instead of I-beam */
    .summary-body .grid tbody tr,
    .summary-body .grid tbody td{
      cursor:pointer;
    }

    /* Keep native cursors for actual interactive controls inside cells */
    .summary-body .grid tbody td input,
    .summary-body .grid tbody td select,
    .summary-body .grid tbody td textarea,
    .summary-body .grid tbody td button,
    .summary-body .grid tbody td a{
      cursor:auto;
    }
/* ===== Weekly Import Summary (NHSP + HR weekly) ===== */
#weeklyImportSummary .weekly-import-card{
  background:#0c172d;
  border:1px solid var(--line);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:12px;
}

/* Important: override global .grid { table-layout: fixed } just for this table */
#weeklyImportSummary .wi-grid{
  table-layout:auto;
}

/* Scroll only the table area */
#weeklyImportSummary .wi-table-wrap{
  max-height: 56vh;          /* adjust if you want taller/shorter */
  overflow: auto;            /* vertical + horizontal if needed */
  border:1px solid var(--line);
  border-radius:10px;
}

/* Keep the table header locked within that scroll area */
#weeklyImportSummary .wi-grid thead th{
  position: sticky;
  top: 0;
  z-index: 6;
  background:#020617;
  box-shadow: 0 1px 0 var(--line);  /* keeps a crisp line when scrolling */
}

/* Wider columns (so it’s not cramped) */
#weeklyImportSummary .wi-col-staff{   width: 200px; }
#weeklyImportSummary .wi-col-unit{    width: 320px; }
#weeklyImportSummary .wi-col-date{    width: 160px; }
#weeklyImportSummary .wi-col-code{    width: 120px; }
#weeklyImportSummary .wi-col-status{  width: 190px; }
#weeklyImportSummary .wi-col-reason{  width: 420px; }
#weeklyImportSummary .wi-col-actions{ width: 260px; }

/* Make action buttons sit neatly */
#weeklyImportSummary .wi-actions{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  align-items:flex-start;
}

/* Row background state colouring (discreet) */
#weeklyImportSummary tr.wi-row-ready{
  background: rgba(22,163,74,.10) !important;   /* soft green */
}
#weeklyImportSummary tr.wi-row-issue{
  background: rgba(239,68,68,.08) !important;   /* soft red */
}

/* Preserve hover but keep the meaning */
#weeklyImportSummary tr.wi-row-ready:hover{
  background: rgba(22,163,74,.16) !important;
}
#weeklyImportSummary tr.wi-row-issue:hover{
  background: rgba(239,68,68,.14) !important;
}

/* ─────────────────────────────────────────────────────────────
   NEW: Weekly Actions table (2nd table) polish
   Uses #weeklyActionsTbody as the stable hook.
   ───────────────────────────────────────────────────────────── */

/* Column sizing for body cells (header widths are already set inline in the renderer) */
#weeklyImportSummary #weeklyActionsTbody td:nth-child(1){
  width:44px;
  min-width:44px;
  max-width:44px;
  text-align:center;
}
#weeklyImportSummary #weeklyActionsTbody td:nth-child(2){
  width:110px;
  min-width:110px;
  max-width:110px;
}
#weeklyImportSummary #weeklyActionsTbody td:nth-child(4){
  width:170px;
  min-width:170px;
  max-width:170px;
  white-space:nowrap;
}
#weeklyImportSummary #weeklyActionsTbody td:nth-child(7){
  width:240px;
  min-width:240px;
  max-width:240px;
  white-space:normal;
  word-break:break-word;
}

/* Subtle group header row styling (group headers are the rows with a single colspan cell) */
#weeklyImportSummary #weeklyActionsTbody tr td[colspan]{
  background: rgba(15,23,42,.55) !important;
  border-bottom: 1px solid var(--line);
}

/* Disabled internal buttons (if/when used in the weekly import card) */
#weeklyImportSummary .btn.disabled,
#weeklyImportSummary .btn[data-disabled="1"]{
  opacity:.45;
  cursor:not-allowed !important;
  filter:saturate(0.6) brightness(0.9);
  pointer-events:none;
}
#weeklyImportSummary .btn.disabled:hover,
#weeklyImportSummary .btn[data-disabled="1"]:hover{
  background:#0b152a;
}

     .grid tr.active,
    .grid tr.selected,
    .grid tr.active.selected{
      background:var(--selection-blue-bg);
      box-shadow:inset 0 0 0 1px var(--selection-blue-border);
    }

    .grid tbody tr.active:hover,
    .grid tbody tr.selected:hover,
    .grid tbody tr.active.selected:hover{
      background:var(--selection-blue-bg-strong);
      box-shadow:inset 0 0 0 1px var(--selection-blue-border);
    }

    .pill{
      font-size:12px;
      border:1px solid var(--line);
      padding:2px 6px;
      border-radius:999px;
      background:#0e1a34;
      color:var(--sub);
    }

    /* Small flex row for multiple issue badges in a cell */
    .issue-badges{
      display:flex;
      flex-wrap:wrap;
      gap:3px;
    }

    /* Timesheet-specific pill variants */
    .pill-ok{
      background:rgba(22,163,74,.15);
      color:#bbf7d0;
      border-color:rgba(16,185,129,.35);
    }
    .pill-info{
      background:rgba(59,130,246,.18);
      color:#bfdbfe;
      border-color:rgba(59,130,246,.45);
    }
    .pill-warn{
      background:rgba(245,158,11,.15);
      color:#fde68a;
      border-color:rgba(251,191,36,.35);
    }
      .pill-bad{
      background:rgba(239,68,68,.15);
      color:#fecaca;
      border-color:rgba(248,113,113,.4);
    }

    /* ===== Banking Pay workbench presentation hooks ===== */
    .banking-pay-candidate-pending{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:2px 8px;
      border-radius:999px;
      border:1px solid rgba(251,191,36,.35);
      background:rgba(245,158,11,.15);
      color:#fde68a;
      font-size:12px;
      white-space:nowrap;
    }
    .banking-pay-candidate-pending .spinner{
      width:10px;
      height:10px;
      border-radius:50%;
      border:2px solid rgba(253,230,138,.35);
      border-top-color:#fde68a;
      animation:bankingPayInlineSpin .8s linear infinite;
      flex:0 0 auto;
    }

    .banking-pay-candidate-failed{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:2px 8px;
      border-radius:999px;
      border:1px solid rgba(248,113,113,.4);
      background:rgba(239,68,68,.15);
      color:#fecaca;
      font-size:12px;
      white-space:nowrap;
    }

    .banking-pay-action-disabled,
    .banking-pay-action-disabled.btn,
    .banking-pay-action-disabled button{
      opacity:.45;
      cursor:not-allowed !important;
      filter:saturate(0.6) brightness(0.9);
      pointer-events:none;
    }

    @keyframes bankingPayInlineSpin{
      to{ transform:rotate(360deg); }
    }

      .banking-nav-alert{
      position:relative;
      border-color:rgba(255,59,59,.9) !important;
      background:rgba(255,48,48,.14) !important;
      box-shadow:0 0 0 1px rgba(255,74,74,.7), 0 0 14px rgba(255,54,54,.65);
      animation:bankingNavAlertPulse 1.8s ease-in-out infinite;
    }
    .banking-nav-alert-badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:16px;
      height:16px;
      margin-left:6px;
      padding:0 5px;
      border-radius:999px;
      background:#ff2f2f;
      color:#fff;
      border:1px solid rgba(255,205,205,.75);
      font-size:11px;
      font-weight:700;
      line-height:1;
      box-shadow:0 0 10px rgba(255,36,36,.75);
      vertical-align:middle;
    }
    @keyframes bankingNavAlertPulse{
      0%,100%{ box-shadow:0 0 0 1px rgba(255,74,74,.7), 0 0 12px rgba(255,54,54,.52); }
      50%{ box-shadow:0 0 0 1px rgba(255,74,74,.9), 0 0 18px rgba(255,54,54,.92); }
    }

    .banking-nav-alert-trigger{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:24px;
      height:24px;
      margin-left:4px;
      border:1px solid rgba(255,205,205,.65);
      border-radius:999px;
      background:rgba(127,29,29,.72);
      color:#fff;
      cursor:pointer;
      box-shadow:0 0 10px rgba(255,36,36,.42);
      line-height:1;
      font-size:12px;
      flex:0 0 auto;
    }
    .banking-nav-alert-trigger:hover,
    .banking-nav-alert-trigger[aria-expanded="true"]{
      background:rgba(220,38,38,.92);
      border-color:rgba(254,202,202,.95);
      box-shadow:0 0 14px rgba(255,36,36,.75);
    }
    .banking-nav-alert-popover{
      position:absolute;
      z-index:80;
      top:calc(100% + 8px);
      right:0;
      width:min(420px, calc(100vw - 24px));
      max-height:min(520px, calc(100vh - 88px));
      overflow:auto;
      padding:10px;
      border:1px solid rgba(248,113,113,.55);
      border-radius:14px;
      background:linear-gradient(180deg,#111827,#020617);
      color:var(--text);
      box-shadow:0 22px 55px rgba(0,0,0,.65), 0 0 0 1px rgba(127,29,29,.38);
    }
    .banking-nav-alert-popover[hidden],
    .banking-nav-alert-popover.is-hidden{
      display:none !important;
    }
    .banking-nav-alert-popover-header{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      padding:2px 2px 8px;
      border-bottom:1px solid rgba(148,163,184,.22);
      margin-bottom:8px;
    }
    .banking-nav-alert-popover-title{
      font-weight:800;
      letter-spacing:.01em;
      color:#fee2e2;
    }
    .banking-nav-alert-popover-subtitle{
      font-size:12px;
      color:#cbd5e1;
      opacity:.9;
    }
    .banking-nav-alert-popover-row{
      display:flex;
      flex-direction:column;
      gap:6px;
      padding:10px;
      margin:8px 0;
      border:1px solid rgba(148,163,184,.26);
      border-radius:12px;
      background:rgba(15,23,42,.78);
      color:var(--text);
    }
    .banking-nav-alert-popover-row.critical{
      border-color:rgba(248,113,113,.72);
      background:linear-gradient(180deg,rgba(127,29,29,.44),rgba(69,10,10,.24));
      box-shadow:inset 3px 0 0 #ef4444;
    }
    .banking-nav-alert-popover-row-title{
      display:flex;
      align-items:center;
      gap:6px;
      flex-wrap:wrap;
      font-weight:800;
      color:#fee2e2;
    }
    .banking-nav-alert-popover-row-meta,
    .banking-nav-alert-popover-row-description{
      font-size:12px;
      color:#e5e7eb;
      opacity:.92;
      overflow-wrap:anywhere;
    }
    .banking-nav-alert-actions{
      display:flex;
      align-items:center;
      justify-content:flex-end;
      gap:8px;
      flex-wrap:wrap;
      margin-top:4px;
    }
    .banking-nav-alert-actions .btn,
    .banking-nav-alert-actions button{
      border:1px solid rgba(148,163,184,.45);
      background:#0b152a;
      color:#fff;
      padding:5px 9px;
      border-radius:999px;
      cursor:pointer;
      font-size:12px;
    }
    .banking-nav-alert-actions .btn:hover,
    .banking-nav-alert-actions button:hover{
      background:rgba(79,70,229,.25);
      border-color:#6366f1;
    }
    .banking-nav-alert-actions .danger,
    .banking-nav-alert-actions [data-action*="clear"]{
      border-color:rgba(248,113,113,.55);
      background:rgba(127,29,29,.42);
      color:#fee2e2;
    }
    .banking-nav-alert-popover-footer{
      display:flex;
      flex-direction:column;
      gap:8px;
      padding-top:8px;
      margin-top:8px;
      border-top:1px solid rgba(148,163,184,.22);
    }
    .banking-nav-alert-popover-reminder{
      font-size:11px;
      line-height:1.35;
      color:#cbd5e1;
      opacity:.86;
    }
    .banking-pay-blocked-funds-badge{
      display:inline-flex;
      flex-direction:column;
      align-items:flex-start;
      gap:2px;
      max-width:100%;
      padding:5px 9px;

    .payment-issues-tab .payment-issue-progress-compact{
      min-width:0;
      overflow-wrap:anywhere;
      padding:10px;
    }
    .payment-issues-tab .payment-issue-manual-action-card{
      border-color:rgba(148,163,184,0.32);
      background:rgba(15,23,42,0.52);
    }
    .payment-issue-table-wrap{
      overflow-x:auto;
      overflow-y:visible;
      max-width:100%;
      border:1px solid var(--line);
      border-radius:10px;
      background:var(--panel);
    }
    .payment-issue-table{
      width:100%;
      border-collapse:collapse;
      font-size:12px;
      line-height:1.35;
      min-width:920px;
    }
    .payment-issue-table th,
    .payment-issue-table td{
      padding:7px 8px;
      border-bottom:1px solid rgba(148,163,184,0.18);
      vertical-align:middle;
    }
    .payment-issue-table th:first-child,
    .payment-issue-table td:first-child{
      width:52px;
      min-width:52px;
      text-align:center;
    }
    .payment-issue-table th:nth-child(2),
    .payment-issue-table td:nth-child(2){
      min-width:180px;
    }
    .payment-issue-table th:nth-child(3),
    .payment-issue-table td:nth-child(3){
      min-width:180px;
    }
    .payment-issue-table th:nth-child(4),
    .payment-issue-table td:nth-child(4){
      min-width:130px;
      text-align:right;
      white-space:nowrap;
    }
    .payment-issue-table th:nth-child(5),
    .payment-issue-table td:nth-child(5),
    .payment-issue-table th:nth-child(7),
    .payment-issue-table td:nth-child(7),
    .payment-issue-table th:nth-child(8),
    .payment-issue-table td:nth-child(8){
      min-width:120px;
      white-space:nowrap;
    }
    .payment-issue-table th:nth-child(6),
    .payment-issue-table td:nth-child(6){
      min-width:220px;
      white-space:normal;
    }
    .payment-issue-row-selected{
      background:rgba(56,189,248,0.12);
      box-shadow:inset 3px 0 0 rgba(56,189,248,0.75);
    }
    .payment-issue-row-review{
      background:rgba(245,158,11,0.16);
      box-shadow:inset 3px 0 0 #f59e0b;
    }
    .payment-issue-badge{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:2px 8px;
      border-radius:999px;
      font-size:11px;
      font-weight:700;
      letter-spacing:.01em;
      color:#fde68a;
      background:rgba(245,158,11,0.18);
      border:1px solid rgba(245,158,11,0.45);
      white-space:nowrap;
    }
    .payment-issue-progress{
      display:flex;
      flex-wrap:wrap;
      gap:6px 10px;
      font-size:12px;
      color:var(--text);
      padding:4px 0;
    }
    .payment-issue-progress-compact{
      padding:8px 10px;
      font-size:12px;
    }
    .payment-issue-progress-compact:empty,
    .payment-issue-progress-compact ul:empty{
      display:none;
    }
    
    .payment-issue-toolbar{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin:8px 0;
      align-items:center;
      min-width:0;
    }
    .payment-issue-actions{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:10px;
      align-items:center;
      justify-content:flex-start;
      min-width:0;
    }
    .payment-issue-approval-chip{
      display:inline-flex;
      align-items:center;
      padding:2px 8px;
      border-radius:999px;
      border:1px solid rgba(148,163,184,0.45);
      background:rgba(148,163,184,0.14);
      color:#e2e8f0;
      font-size:11px;
      line-height:1.2;
      white-space:nowrap;
    }
    .payment-issue-sort-button{
      background:transparent;
      border:0;
      color:inherit;
      font:inherit;
      cursor:pointer;
      padding:2px 4px;
      border-radius:6px;
      line-height:1.25;
    }
    .payment-issue-sort-button:hover{
      background:rgba(148,163,184,0.12);
    }
    .payment-issue-finance-review{
      border:1px solid rgba(148,163,184,0.25);
      border-radius:8px;
      padding:8px;
      background:rgba(15,23,42,0.45);
    }
    .payment-issue-confirm-reauth{
      border:1px dashed rgba(148,163,184,0.35);
      border-radius:8px;
      padding:8px;
    }
    .payment-issue-group-selector{
      display:flex;
      gap:6px;
      align-items:center;
      flex-wrap:wrap;
    }
  </style>

</head>

<body>
  <div class="topbar">
    <div class="brand"><span class="row-dot"></span> CloudTMS</div>
    <div class="nav" id="nav"></div>
    <div class="userbox">
      <span class="chip" id="userChip">Signed out</span>
      <button id="btnLogout">Logout</button>
    </div>
  </div>

  <div class="layout">
    <aside class="panel tools" id="tools">
      <h3>Tools</h3>
      <div id="toolButtons"></div>
      <div class="group">
        <div class="note">Tip: Double-click a row to view. Click <strong>Edit</strong> in the dialog to make changes.</div>
      </div>
    </aside>

    <main class="panel main">
      <div class="toolbar">
        <div class="title" id="title">Loading…</div>
        <div class="spacer"></div>
        <input type="text" id="quickSearch" placeholder="Quick search…"/>
        <button id="btnColumns">Columns</button>
      </div>
      <div id="content"></div>
    </main>
   </div>

   <!-- ✅ Global loading overlay (spinner only) -->
  <div id="globalLoadingOverlay" aria-hidden="true">
    <div class="gload-spinner" aria-hidden="true">
      <span style="--i:0"></span><span style="--i:1"></span><span style="--i:2"></span><span style="--i:3"></span>
      <span style="--i:4"></span><span style="--i:5"></span><span style="--i:6"></span><span style="--i:7"></span>
    </div>
  </div>


  <!-- ===== Draggable modal ===== -->
  <div class="modal-back" id="modalBack">
  <div class="modal" id="modal">

    <div class="modal-h" id="modalDrag">
      <div class="ttl" id="modalTitle">Details</div>
      <div class="spacer"></div>
      <!-- Related moved up next to Close -->
      <button id="btnRelated" style="display:none">Related</button>
      <button id="btnCloseModal">Close</button>
    </div>
    <div class="modal-b">
      <div class="tabs" id="modalTabs"></div>
      <div class="tabc" id="modalBody"></div>
    </div>
    <div class="actions" id="modalActions">
      <span class="hint" id="modalHint"></span>
      <div class="spacer"></div>
      <!-- Bottom row now only core actions -->
      <button id="btnDelete" class="danger" style="display:none">Delete</button>
      <button id="btnEditModal" style="display:none">Edit</button>
      <button id="btnSave" class="primary">Save</button>
    </div>
  </div>
</div>
  <!-- ===== Auth overlays ===== -->
  <div class="auth-overlay" id="loginOverlay" aria-hidden="true">
    <div class="auth-card">
      <div class="auth-h"><div class="ttl">Sign in</div></div>
      <form class="auth-f" id="loginForm">
        <div id="loginError" class="error" style="display:none"></div>
        <div class="row">
          <label>Email</label>
          <input id="loginEmail" type="email" autocomplete="username" required />
        </div>
        <div class="row">
          <label>Password</label>
          <div class="split">
            <input id="loginPassword" type="password" autocomplete="current-password" required />
            <span class="eye" id="toggleLoginPw">show</span>
          </div>
        </div>
        <div class="row">
          <label><input type="checkbox" id="rememberMe" checked/> Keep me signed in</label>
        </div>
        <div class="actions">
          <span class="link" id="linkForgot">Forgot password?</span>
          <button type="submit" class="primary">Sign in</button>
        </div>
      </form>
    </div>
  </div>

  <div class="auth-overlay" id="forgotOverlay" aria-hidden="true">
    <div class="auth-card">
      <div class="auth-h"><div class="ttl">Password reset</div></div>
      <form class="auth-f" id="forgotForm">
        <div id="forgotMsg" class="success" style="display:none"></div>
        <div id="forgotError" class="error" style="display:none"></div>
        <div class="row">
          <label>Enter your account email</label>
          <input id="forgotEmail" type="email" required />
        </div>
        <div class="actions">
          <span class="link" id="linkBackToLogin">Back to login</span>
          <button type="submit">Send reset email</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ✅ NEW: 2FA overlay -->
  <div class="auth-overlay" id="tfaOverlay" aria-hidden="true">
    <div class="auth-card">
      <div class="auth-h"><div class="ttl">Verification code</div></div>
      <form class="auth-f" id="tfaForm">
        <div id="tfaMsg" class="success" style="display:none"></div>
        <div id="tfaError" class="error" style="display:none"></div>

        <div class="row">
          <label>Enter the 6-digit code we emailed you</label>
          <input
            id="tfaCode"
            type="text"
            inputmode="numeric"
            autocomplete="one-time-code"
            pattern="[0-9]{6}"
            maxlength="6"
            required
          />
        </div>

        <div class="actions">
          <span class="link" id="linkTfaBackToLogin">Back to login</span>
          <div style="display:flex; gap:10px; align-items:center;">
            <button type="button" id="btnTfaResend">Resend code</button>
            <button type="submit" class="primary">Verify</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <div class="auth-overlay" id="resetOverlay" aria-hidden="true">
    <div class="auth-card">
      <div class="auth-h"><div class="ttl">Set a new password</div></div>
      <form class="auth-f" id="resetForm">
        <div id="resetMsg" class="success" style="display:none"></div>
        <div id="resetError" class="error" style="display:none"></div>
        <div class="row">
          <label>New password</label>
          <div class="split">
            <input id="resetPw1" type="password" autocomplete="new-password" required minlength="8" />
            <span class="eye" id="toggleResetPw1">show</span>
          </div>
        </div>
        <div class="row">
          <label>Confirm new password</label>
          <div class="split">
            <input id="resetPw2" type="password" autocomplete="new-password" required minlength="8" />
            <span class="eye" id="toggleResetPw2">show</span>
          </div>
        </div>
        <div class="actions">
          <span class="link" id="linkResetToLogin">Back to login</span>
          <button type="submit" class="primary">Update password</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 1) Define the global base URL early -->
  <script>


  </script>

  <!-- 2) Load the application logic -->
 <script src="./js/main.js"></script>
</body>
</html>
